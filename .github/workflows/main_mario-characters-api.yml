name: Build Mario Characters API

on:
  push:
    branches:
      - main
      - test
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PROJECT_PATH: MarioCharactersAPI/MarioCharactersAPI.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore "$PROJECT_PATH"

      - name: Build with dotnet
        run: dotnet build "$PROJECT_PATH" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "$PROJECT_PATH" --configuration Release --no-build --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: mario-characters-api
          path: publish